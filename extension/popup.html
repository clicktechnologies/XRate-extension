<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XRate</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="xrate-popup">
      <header class="xrate-popup__header">
        <div class="xrate-brand">
          <img class="xrate-brand__icon" src="icons/icon-48.png" alt="">
          <h1>XRate</h1>
        </div>
        <div class="xrate-popup__controls">
          <p id="status" class="xrate-status" role="status"></p>
          <label class="xrate-switch">
            <input id="enabled" type="checkbox">
            <span data-i18n="toggleEnabled">Enabled</span>
          </label>
        </div>
      </header>

      <section class="xrate-section">
        <div class="xrate-section__head">
          <h2 data-i18n="sectionCurrencies">Conversion currencies</h2>
          <span id="currency-count" class="xrate-count"></span>
        </div>
        <p class="xrate-hint" data-i18n="currenciesHint">Shown in the tooltip when you select an amount</p>
        <div id="currency-list" class="xrate-currency-list"></div>
      </section>

      <section class="xrate-section">
        <h2 data-i18n="sectionSource">Rate source</h2>
        <label class="xrate-field">
          <span class="xrate-field__label" data-i18n="providerLabel">Provider</span>
          <select id="source-select"></select>
        </label>
        <dl class="xrate-meta">
          <div>
            <dt data-i18n="metaSource">Source</dt>
            <dd id="source-name" data-i18n="loading">Loading…</dd>
          </div>
          <div>
            <dt data-i18n="metaRateDate">Rate date</dt>
            <dd id="rate-date" data-i18n="loading">Loading…</dd>
          </div>
          <div>
            <dt data-i18n="metaFetchedAt">Updated</dt>
            <dd id="fetched-at" data-i18n="loading">Loading…</dd>
          </div>
        </dl>
        <div class="xrate-actions">
          <a id="source-link" href="https://www.ecb.europa.eu/stats/eurofxref/eurofxref-daily.xml" target="_blank" rel="noreferrer" data-i18n="openSource">View source</a>
          <button id="refresh-rates" type="button" data-i18n="refreshRates">Refresh rate</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
